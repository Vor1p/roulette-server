<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ogorod Games: Каземат</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #0d0a06;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            color: #d4c09d;
            font-family: 'Georgia', serif;
            overflow: hidden;
            /* Реалистичный фон стола на CSS */
            background: 
                radial-gradient(circle at 50% 20%, rgba(139, 107, 78, 0.3) 0%, rgba(0,0,0,0) 70%),
                repeating-linear-gradient(90deg, #110e0a 0px, #1a150f 1px, #110e0a 2px, #1a150f 3px),
                linear-gradient(to bottom, #110e0a, #0d0a06);
            background-blend-mode: soft-light, color-burn, normal;
        }

        #game-app {
            width: 100%; height: 100vh;
            max-width: 500px;
            display: flex; flex-direction: column;
            position: relative;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        /* Бирки здоровья */
        .label-tag {
            background: #1a150f; border: 1px solid #4d3d28;
            padding: 4px 12px; font-size: 12px;
            letter-spacing: 2px; text-transform: uppercase;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .zone { padding: 20px; z-index: 10; }
        .top-zone { display: flex; flex-direction: column; align-items: flex-end; }
        .bottom-zone { display: flex; flex-direction: column; align-items: flex-start; margin-top: auto; }

        /* Патроны */
        .hp-cartridges { display: flex; gap: 8px; margin-top: 10px; }
        .cartridge {
            width: 18px; height: 45px;
            background: linear-gradient(135deg, #8b6e3f 0%, #d4c09d 50%, #8b6e3f 100%);
            border-radius: 4px 4px 1px 1px; border: 1px solid #4d3d28;
            position: relative; box-shadow: 2px 3px 6px rgba(0,0,0,0.5);
        }
        .cartridge.live::before {
            content: ''; position: absolute; top: -6px; left: 1px;
            width: 14px; height: 15px;
            background: radial-gradient(circle at 30% 30%, #666, #111);
            border-radius: 50% 50% 0 0;
        }
        .cartridge.spent { background: #221a10; opacity: 0.5; border-color: #111; }
        .cartridge.spent::before { display: none; }

        /* ЦЕНТР: РЕВОЛЬВЕР */
        .table-view {
            flex-grow: 1; display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        .gun-container {
            width: 90%; position: relative;
            animation: breath 4s infinite ease-in-out;
            display: flex; justify-content: center;
        }

        #main-gun {
            width: 100%;
            max-width: 350px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9));
            /* Магия: убирает черный фон у картинки, оставляя только объект */
            mix-blend-mode: screen; 
            transition: transform 0.15s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }

        /* Анимация отдачи */
        .recoil { transform: scale(1.15) translateY(-30px) rotate(-10deg); }

        @keyframes breath {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
        }

        /* Инвентарь */
        .inventory {
            background: rgba(0,0,0,0.4);
            padding: 15px; display: flex; justify-content: center;
            gap: 25px; border-top: 1px solid #332211;
        }
        .item { font-size: 32px; cursor: pointer; transition: 0.1s; filter: sepia(0.5); }
        .item:active { transform: scale(1.4); filter: sepia(0); }

        /* Кнопки */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #2a1b0a; }
        .btn {
            background: #1a0f05; border: none; color: #d4c09d;
            padding: 25px; font-size: 15px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
        }
        .btn:active { background: #3c2a16; color: #fff; }
    </style>
</head>
<body>

<div id="game-app">
    <div class="zone top-zone">
        <div class="label-tag">Гроссмейстер</div>
        <div class="hp-cartridges">
            <div class="cartridge spent"></div><div class="cartridge spent"></div><div class="cartridge spent"></div><div class="cartridge spent"></div><div class="cartridge spent"></div>
        </div>
    </div>

    <div class="table-view">
        <div class="gun-container">
            <img src="gun.png" id="main-gun" alt="Револьвер">
        </div>
    </div>

    <div class="zone bottom-zone">
        <div class="hp-cartridges">
            <div class="cartridge live"></div><div class="cartridge live"></div><div class="cartridge live"></div><div class="cartridge live"></div><div class="cartridge live"></div>
        </div>
        <div class="label-tag" style="margin-top:10px;">Твоё здоровье</div>
    </div>

    <div class="inventory">
        <div class="item" onclick="use('🔍')">🔍</div>
        <div class="item" onclick="use('🔪')">🔪</div>
        <div class="item" onclick="use('🍺')">🍺</div>
        <div class="item" onclick="use('💥')">💥</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="shoot('self')">В себя</button>
        <button class="btn" onclick="shoot('enemy')">В врага</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
const SERVER_URL = 'https://itchy-loops-crash.loca.lt'; // Ссылка от Render

    async function shoot(target) {
    // 1. Убедись, что SERVER_URL без слэша в конце!
    // Пример: const SERVER_URL = 'https://your-link.loca.lt';
    
    try {
        const userId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id || "12345";
        
        const response = await fetch(`${SERVER_URL}/api/move`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                user_id: userId,
                action: target
            })
        });

        if (!response.ok) {
            throw new Error(`Код ошибки сервера: ${response.status}`);
        }

        const data = await response.json();
        alert("Результат: " + data.result); // Если это сработает — мы победили!

    } catch (e) {
        // Если здесь напишет "Failed to fetch" — Telegram блокирует туннель
        alert("ОШИБКА: " + e.message);
    }
}

        const data = await response.json();

        // 2. Обновляем интерфейс БЕЗ перезагрузки
        setTimeout(() => {
            document.getElementById('main-gun').classList.remove('recoil');
            
            if (data.result === 'hit') {
                showBloodEffect(); // Твоя будущая функция вспышки
            }
            
            // Обновляем полоски HP
            updateUI(data.player_hp, data.enemy_hp);
        }, 300);

    } catch (e) {
        alert("Ошибка связи: " + e.message);
    }
}
</script>

</body>
</html>
